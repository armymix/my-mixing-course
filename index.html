<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光專業音樂混音班</title>
    <!-- Tailwind CSS CDN (純 CSS 框架，100% 穩定無衝突) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-600/20">
                    <span id="header-logo-icon"></span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">光專業音樂混音班</h1>
                    <p class="text-xs text-zinc-400">客製化音樂混音學習與實踐平台</p>
                </div>
            </div>
            
            <!-- 分類導覽 Tabs -->
            <div class="flex flex-wrap gap-1.5 p-1 bg-zinc-900 border border-zinc-800 rounded-xl">
                <button onclick="switchCategory('core')" id="tab-core" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all">核心基礎</button>
                <button onclick="switchCategory('edm')" id="tab-edm" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all">電音特訓</button>
                <button onclick="switchCategory('band')" id="tab-band" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all">樂團實戰</button>
                <button onclick="switchCategory('hiphop')" id="tab-hiphop" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all">嘻哈/Trap</button>
            </div>

            <!-- 進度條 -->
            <div class="flex items-center gap-4">
                <div class="flex flex-col items-end hidden sm:flex">
                    <span class="text-[10px] text-zinc-500 uppercase font-semibold">此類別進度</span>
                    <span id="progress-text" class="text-sm font-mono text-indigo-400">0%</span>
                </div>
                <div class="w-28 h-2 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500 w-0"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 左側：項目列表目錄 -->
            <aside class="lg:col-span-4 xl:col-span-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl">
                    <div class="p-4 border-b border-zinc-800 bg-zinc-800/30 flex items-center gap-2">
                        <span id="sidebar-layout-icon"></span>
                        <span class="text-sm font-bold uppercase tracking-wider text-zinc-400">項目目錄</span>
                    </div>
                    <div id="sidebar-menu" class="max-h-[65vh] overflow-y-auto p-2 custom-scrollbar space-y-4">
                        <!-- 由 JS 動態生成目錄 -->
                    </div>
                </div>
            </aside>

            <!-- 右側：詳細內容區 -->
            <section class="lg:col-span-8 xl:col-span-9">
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden min-h-[600px] flex flex-col shadow-2xl">
                    
                    <!-- 漸層頂部區塊 -->
                    <div id="content-hero" class="p-10 bg-gradient-to-br relative transition-all duration-300">
                        <div class="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none">
                            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" strokeWidth="1"/>
                                    </pattern>
                                </defs>
                                <rect width="100%" height="100%" fill="url(#grid)" />
                            </svg>
                        </div>
                        
                        <div class="relative z-10 flex flex-col md:flex-row md:items-end justify-between gap-8 text-white">
                            <div class="space-y-4">
                                <div class="flex items-center gap-2 font-bold text-xs uppercase tracking-[0.2em] bg-black/20 px-3 py-1 rounded-full w-max">
                                    <span id="hero-phase-icon"></span>
                                    <span id="hero-phase-title">-</span>
                                </div>
                                <h2 class="text-3xl md:text-4xl font-black leading-tight">
                                    <span id="hero-item-number">第 - 項</span><br/>
                                    <span id="hero-item-title" class="opacity-95 text-2xl md:text-3xl mt-1 block">-</span>
                                </h2>
                            </div>
                            
                            <button id="complete-btn" class="flex items-center gap-3 px-8 py-4 rounded-2xl font-bold transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                                <!-- 完成按鈕狀態由 JS 決定 -->
                            </button>
                        </div>
                    </div>

                    <!-- 重點與建議 -->
                    <div class="p-10 flex-grow space-y-10 flex flex-col justify-between">
                        <div>
                            <h3 class="flex items-center gap-3 text-lg font-bold text-zinc-100 mb-6">
                                <span id="section-book-icon" class="text-indigo-400"></span> 本項核心重點
                            </h3>
                            <div id="details-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <!-- 由 JS 動態渲染重點項目 -->
                            </div>
                        </div>

                        <div class="p-6 bg-indigo-500/5 rounded-2xl border border-indigo-500/10 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-8 opacity-5 group-hover:opacity-10 transition-opacity">
                                <span id="section-zap-icon" class="text-indigo-500"></span>
                            </div>
                            <div class="flex gap-4 relative z-10">
                                <div class="w-1.5 bg-indigo-500 rounded-full flex-shrink-0"></div>
                                <div>
                                    <h4 class="font-black text-indigo-400 mb-2 text-xs uppercase tracking-widest">大師建議 Pro Tip</h4>
                                    <p id="pro-tip-text" class="text-zinc-400 text-sm leading-relaxed">-</p>
                                </div>
                            </div>
                        </div>

                        <!-- 上下項目切換按鈕 -->
                        <div class="flex items-center justify-between pt-8 border-t border-zinc-800 mt-auto">
                            <button id="prev-btn" class="flex items-center gap-2 text-zinc-500 hover:text-white disabled:opacity-25 font-bold transition-all text-sm">
                                前一個項目
                            </button>
                            <button id="next-btn" class="px-8 py-3 bg-zinc-100 hover:bg-white text-zinc-900 rounded-xl font-bold transition-all text-sm disabled:opacity-25">
                                下一個項目
                            </button>
                        </div>
                    </div>
                    
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-900 bg-zinc-950 py-6 text-center text-xs text-zinc-600 mt-auto">
        <p>© <span id="current-year"></span> 光專業音樂混音班. All rights reserved. 混音是一門科學，也是永無止境的藝術。</p>
    </footer>

    <!-- JS 邏輯代碼 (全原生，無任何編譯問題，速度極快) -->
    <script>
        // 1. 圖示庫 SVG
        const SVGS = {
            music: `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" /></svg>`,
            settings: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></svg>`,
            waves: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10a4 4 0 0 1 8 0v4a4 4 0 0 0 8 0" /><path d="M6 10a4 4 0 0 1 8 0v4a4 4 0 0 0 8 0" /></svg>`,
            "volume-2": `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></svg>`,
            "mic-2": `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 8-9.04 9.06a3 3 0 1 0 4.24 4.24L16.21 12" /><circle cx="16" cy="8" r="4" /></svg>`,
            zap: `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>`,
            zapLarge: `<svg class="w-16 h-16 text-indigo-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>`,
            award: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6" /><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11" /></svg>`,
            layout: `<svg class="w-4 h-4 text-zinc-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M9 3v18" /><path d="M9 9h12" /></svg>`,
            "book-open": `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg>`,
            "check-circle-2": `<svg class="w-4 h-4 text-emerald-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></svg>`,
            "check-circle-white": `<svg class="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></svg>`,
            circle: `<svg class="w-4 h-4 text-zinc-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /></svg>`,
            circleWhite: `<svg class="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /></svg>`,
            disc: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="2" /></svg>`,
            guitar: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 4 4" /><path d="m14 14 6-6" /><path d="M9 18a4 4 0 1 0-8-8 4 4 0 0 0 8 8Z" /><path d="m14 10 .5.5" /><path d="m12.5 8.5.5.5" /></svg>`,
            speaker: `<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" /><circle cx="12" cy="14" r="4" /><line x1="12" x2="12.01" y1="6" y2="6" /></svg>`
        };

        // 2. 核心數據
        const categories = {
            core: {
                name: "核心混音基礎班 (24項)",
                bgGradient: "from-blue-500 to-cyan-400",
                data: [
                    {
                        phase: "第一階段：基礎建設與聽覺覺醒",
                        icon: "settings",
                        weeks: [
                            { id: 1, title: "聲學基礎與監聽環境", details: ["聲音的物理特性：頻率、振幅、相位", "監聽系統配置：喇叭擺位與空間聲學處理 (Bass Traps/Diffusers)"], tip: "混音最怕『聽不準』。建議先調整好喇叭與頭部的等邊三角形位置，並在牆角放置吸音棉處理低頻堆積，這是最省錢且最有效的升級。" },
                            { id: 2, title: "數位音訊理論 (Digital Audio 101)", details: ["Sample Rate 與 Bit Depth 的真實意義", "緩衝區 (Buffer Size) 與延遲 (Latency) 管理"], tip: "錄音時請務必使用 24-bit 以獲得更大的動態空間（Headroom），這能讓你在混音階段有更多空間調整，避免數位破音。" },
                            { id: 3, title: "DAW 深度操作與工作流", details: ["建立專屬混音模板 (Template)", "高效快捷鍵、軌道管理與訊號路由 (Routing) 邏輯"], tip: "高手混音很快，是因為他們有強大的 Template。把常用的 Reverb Send、常用的插件鏈存好，讓你把精神專注在音樂而非技術操作。" },
                            { id: 4, title: "關鍵聽力訓練 (Ear Training)", details: ["辨識頻率規律：使用 EQ 練習聽出 1kHz, 5k, 200Hz 的差異", "訓練對 1dB 音量變化的敏感度"], tip: "聽力是混音師的肌肉。每天練習 15 分鐘聽力軟體，比買任何昂貴的插件都更有價值。" }
                        ]
                    },
                    {
                        phase: "第二階段：頻率與動態的精密手術",
                        icon: "waves",
                        weeks: [
                            { id: 5, title: "EQ 基礎：清理與校正", details: ["高通/低通濾波器的正確時機", "掃除混濁感 (Muddy) 與處理相位抵消"], tip: "High Pass Filter 是你的好朋友。除了 Kick 和 Bass，幾乎所有軌道都可以適度切除 100Hz 以下，這樣整首歌會立刻變得清晰。" },
                            { id: 6, title: "EQ 進階：塑造與色彩", details: ["類比模擬 EQ (Pultec, Neve, SSL) 的音色渲染", "動態 EQ (Dynamic EQ) 的應用場景"], tip: "當你想要『推高頻』時，嘗試使用類比模擬 EQ。它們帶來的諧波能讓高音聽起來明亮但不刺耳。" },
                            { id: 7, title: "壓縮器基礎：控制的力量", details: ["五大參數詳解：Threshold, Ratio, Attack, Release, Knee"], tip: "先調整 Release。如果 Release 太快，聲音會產生抽吸感；太慢則會讓下一個重音被過度壓抑，找回律動感是關鍵。" },
                            { id: 8, title: "壓縮器進階：風格與黏合", details: ["VCA, FET, Opto, Vari-Mu 四種壓縮器的特性與選用"], tip: "人聲適合 Opto (如 LA-2A) 的溫潤感，鼓組則適合 FET (如 1176) 的快速反應。了解硬體特性會讓你選插件更準確。" },
                            { id: 9, title: "動態工具擴展", details: ["擴張器 (Expander) 與門限器 (Gate) 的精準修剪", "瞬態塑形器 (Transient Shaper) 調整打擊感"], tip: "如果鼓組不夠有力，嘗試用 Transient Shaper 增加 Attack，這有時候比加壓縮器更有效果且更自然。" },
                            { id: 10, title: "限制器與齒音消除", details: ["Limiter 的透明度控制", "De-esser 處理人聲與高頻刺耳聲"], tip: "De-esser 不只用於人聲。當吉他或鈸的高頻太刺耳時，適度使用 De-esser 也能在不改變音色的情況下解決問題。" }
                        ]
                    },
                    {
                        phase: "第三階段：空間、深度與維度",
                        icon: "volume-2",
                        weeks: [
                            { id: 11, title: "殘響 (Reverb) 的空間構成", details: ["打造前後距離感：早期反射 (Early Reflection) 的重要性", "利用 Reverb EQ 保持混音清晰"], tip: "記得給你的 Reverb 軌道加上 EQ，切掉 600Hz 以下與 5kHz 以上。這樣 Reverb 會有一層『朦朧美』，且不會弄髒主音軌。" },
                            { id: 12, title: "延遲 (Delay) 的節奏與層次", details: ["Slapback Delay, Ping-pong, 以及創造深度的隱形 Delay"], tip: "想讓人聲更有深度又不想用 Reverb？嘗試用一個極短的 Delay (30-60ms)，它會像影子一樣支撐著人聲。" },
                            { id: 13, title: "相位與寬度 (Stereo Imaging)", details: ["Mid-Side (M/S) 處理技術", "如何讓聲音「變寬」而不失真或產生相位問題"], tip: "加寬聲音前，務必檢查單聲道（Mono）。如果切到 Mono時聲音變得很虛，代表你做得太過了，會有嚴重的相位抵消。" },
                            { id: 14, title: "飽和度與諧波 (Saturation/Distortion)", details: ["Tape, Tube, Transformer 的溫暖感", "為數位聲音注入類比「魂」"], tip: "Saturation 是混音的秘密調味料。在 Bass 上加一點點飽和度，能讓它在小喇叭（如手機）上也被聽得見。" }
                        ]
                    },
                    {
                        phase: "第四階段：核心元素專項攻克",
                        icon: "mic-2",
                        weeks: [
                            { id: 15, title: "節奏組混音 (Drums & Percussion)", details: ["大鼓與貝斯的低頻戰爭", "鼓組的並聯壓縮 (Parallel Compression) 技巧"], tip: "大鼓(Kick)與貝斯(Bass)要共存，就得分配好誰佔據最低頻。如果 Kick 在 60Hz 很有力，Bass 就避開那裡，反之亦然。" },
                            { id: 16, title: "低音與諧波 (Bass & Synth)", details: ["讓 Bass 在小喇叭上也能被聽見的秘訣"], tip: "使用 Sidechain 讓 Kick 下去時 Bass 稍微閃避 (Ducking)，這能創造出豐富的節奏呼吸感。" },
                            { id: 17, title: "人聲修整與對位", details: ["Melodyne 與 Auto-Tune 的藝術", "手動音量增益自動化 (Gain Staging & Automation)"], tip: "調音要自然，手動修正優於自動校正。保留一點點不完美，反而能讓人聲聽起來更有真實的人性和情感。" },
                            { id: 18, title: "人聲混音實戰", details: ["處理主唱、和聲、疊唱的空間排列"], tip: "和聲可以處理得比主唱『薄』一點，並拉開相位。這樣人聲牆會非常有層次，且不會擋住主唱的頻率。" }
                        ]

        // 3. 全局狀態管理 (用原生變數取代 React State)
        let currentCat = 'core';
        let activeWeekId = 1;
        let completedWeeks = {};

        // 初始化載入
        window.onload = function() {
            // 安全讀取 LocalStorage
            try {
                const saved = localStorage.getItem('mixing_course_progress_v2');
                if (saved) {
                    completedWeeks = JSON.parse(saved);
                }
            } catch (e) {
                console.warn("Storage blocked by sandbox iframe. Running in temporary memory mode.");
            }

            // 初始化靜態圖示
            document.getElementById('header-logo-icon').innerHTML = SVGS.music;
            document.getElementById('sidebar-layout-icon').innerHTML = SVGS.layout;
            document.getElementById('section-book-icon').innerHTML = SVGS.book-open || SVGS.music;
            document.getElementById('section-zap-icon').innerHTML = SVGS.zap;
            document.getElementById('current-year').textContent = new Date().getFullYear();

            // 初始渲染
            renderApp();
        };

        // 4. 切換類別
        function switchCategory(catId) {
            currentCat = catId;
            activeWeekId = categories[catId].data[0].weeks[0].id; // 預設跳到該類別第一個
            renderApp();
        }

        // 5. 標記/取消 項目完成狀態
        function toggleComplete() {
            if (!completedWeeks[currentCat]) {
                completedWeeks[currentCat] = [];
            }
            const catCompleted = completedWeeks[currentCat];
            const index = catCompleted.indexOf(activeWeekId);

            if (index > -1) {
                catCompleted.splice(index, 1); // 移除完成
            } else {
                catCompleted.push(activeWeekId); // 新增完成
            }

            // 安全寫入 LocalStorage
            try {
                localStorage.setItem('mixing_course_progress_v2', JSON.stringify(completedWeeks));
            } catch (e) {}

            renderApp();
        }

        // 6. 主渲染引擎 (完全取代 React Virtual DOM 的效能瓶頸)
        function renderApp() {
            const catData = categories[currentCat];
            const allWeeksOfCurrentCat = catData.data.flatMap(phase => phase.weeks);
            
            // 找到當前週的資料
            const currentWeekData = allWeeksOfCurrentCat.find(w => w.id === activeWeekId) || allWeeksOfCurrentCat[0];
            
            // 找到當前階段 phase 的資料
            const currentPhase = catData.data.find(phase => 
                phase.weeks.some(w => w.id === currentWeekData.id)
            ) || catData.data[0];

            // A. 更新 Tab 按鈕高亮
            ['core', 'edm', 'band', 'hiphop'].forEach(id => {
                const tab = document.getElementById(`tab-${id}`);
                if (id === currentCat) {
                    tab.className = `px-3 py-1.5 text-xs font-bold rounded-lg transition-all text-white bg-indigo-600`;
                } else {
                    tab.className = `px-3 py-1.5 text-xs font-bold rounded-lg transition-all text-zinc-400 hover:text-white`;
                }
            });

            // B. 計算並更新進度條
            const catCompleted = completedWeeks[currentCat] || [];
            const completedCount = catCompleted.length;
            const totalCount = allWeeksOfCurrentCat.length;
            const progress = Math.round((completedCount / totalCount) * 100) || 0;

            document.getElementById('progress-text').textContent = `${progress}%`;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            // C. 渲染左側 Sidebar 目錄
            const sidebarMenu = document.getElementById('sidebar-menu');
            sidebarMenu.innerHTML = ''; // 清空重新填入

            catData.data.forEach(phase => {
                const phaseSection = document.createElement('div');
                phaseSection.className = 'mb-4 last:mb-0';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'px-3 py-2 text-[10px] uppercase font-black text-zinc-600 tracking-widest leading-relaxed';
                titleDiv.textContent = phase.phase;
                phaseSection.appendChild(titleDiv);

                const listContainer = document.createElement('div');
                listContainer.className = 'space-y-1';

                phase.weeks.forEach(week => {
                    const isCompleted = catCompleted.includes(week.id);
                    const isActive = week.id === activeWeekId;

                    const btn = document.createElement('button');
                    btn.onclick = () => {
                        activeWeekId = week.id;
                        renderApp();
                    };
                    btn.className = `w-full flex items-center justify-between p-3 rounded-xl transition-all ${
                        isActive 
                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' 
                            : 'hover:bg-zinc-800 text-zinc-400'
                    }`;

                    // 內部結構
                    btn.innerHTML = `
                        <div class="flex items-center gap-2.5 min-w-0">
                            <span class="text-[10px] font-mono px-1.5 py-0.5 rounded flex-shrink-0 ${
                                isActive ? 'bg-indigo-400 text-white' : 'bg-zinc-800 text-zinc-400'
                            }">
                                #0${week.id}
                            </span>
                            <span class="text-sm font-medium truncate">${week.title}</span>
                        </div>
                        <div class="flex-shrink-0">
                            ${isCompleted ? (isActive ? SVGS['check-circle-white'] : SVGS['check-circle-2']) : ''}
                        </div>
                    `;
                    listContainer.appendChild(btn);
                });

                phaseSection.appendChild(listContainer);
                sidebarMenu.appendChild(phaseSection);
            });

            // D. 渲染右側 Hero Banner 詳情
            const contentHero = document.getElementById('content-hero');
            // 動態更新漸層背景
            contentHero.className = `p-10 bg-gradient-to-br ${catData.bgGradient} relative transition-all duration-300`;
            
            document.getElementById('hero-phase-icon').innerHTML = SVGS[currentPhase.icon] || SVGS.music;
            document.getElementById('hero-phase-title').textContent = currentPhase.phase;
            document.getElementById('hero-item-number').textContent = `第 ${currentWeekData.id} 項`;
            document.getElementById('hero-item-title').textContent = currentWeekData.title;

            // E. 渲染「完成」按鈕狀態
            const completeBtn = document.getElementById('complete-btn');
            const isCompleted = catCompleted.includes(activeWeekId);
            completeBtn.onclick = toggleComplete;
            if (isCompleted) {
                completeBtn.className = "flex items-center gap-3 px-8 py-4 rounded-2xl font-bold transition-all transform hover:scale-[1.02] active:scale-[0.98] bg-white text-emerald-600 shadow-xl";
                completeBtn.innerHTML = `${SVGS['check-circle-2']} 已完成項目`;
            } else {
                completeBtn.className = "flex items-center gap-3 px-8 py-4 rounded-2xl font-bold transition-all transform hover:scale-[1.02] active:scale-[0.98] bg-black/30 text-white border border-white/10 backdrop-blur-sm";
                completeBtn.innerHTML = `${SVGS.circleWhite} 標記為完成`;
            }

            // F. 渲染核心重點細節
            const detailsContainer = document.getElementById('details-container');
            detailsContainer.innerHTML = '';
            currentWeekData.details.forEach((detail, idx) => {
                const detailDiv = document.createElement('div');
                detailDiv.className = 'flex gap-5 p-5 bg-zinc-800/30 rounded-2xl border border-zinc-700/20 hover:border-zinc-500/30 transition-all';
                detailDiv.innerHTML = `
                    <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-zinc-800 border border-zinc-700/50 flex items-center justify-center text-xs font-bold text-zinc-400">
                        ${idx + 1}
                    </div>
                    <p class="text-zinc-300 leading-relaxed pt-0.5 text-sm font-medium">${detail}</p>
                `;
                detailsContainer.appendChild(detailDiv);
            });

            // G. 渲染大師建議 Pro Tip
            document.getElementById('pro-tip-text').textContent = currentWeekData.tip;

            // H. 控制上下頁按鈕的啟用/停用
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            const currentIndex = allWeeksOfCurrentCat.findIndex(w => w.id === activeWeekId);

            prevBtn.disabled = currentIndex === 0;
            prevBtn.onclick = function() {
                if (currentIndex > 0) {
                    activeWeekId = allWeeksOfCurrentCat[currentIndex - 1].id;
                    renderApp();
                }
            };

            nextBtn.disabled = currentIndex === allWeeksOfCurrentCat.length - 1;
            nextBtn.onclick = function() {
                if (currentIndex < allWeeksOfCurrentCat.length - 1) {
                    activeWeekId = allWeeksOfCurrentCat[currentIndex + 1].id;
                    renderApp();
                }
            };
        }
    </script>
</body>
</html>
