                        setCompletedWeeks(JSON.parse(savedProgress));

                } catch (e) {
                    // 若在 iframe 沙盒中 localStorage 被阻擋，控制台輸出警告並進入臨時記憶體模式
                    console.warn('Storage blocked by iframe sandbox. Program is running in temporary memory mode.', e);

                    ...completedWeeks,
                    [currentCat]: updatedCatCompleted
                };

                setCompletedWeeks(updatedCompletedWeeks);
                
                // 採用安全性封裝寫入 localStorage

                    localStorage.setItem('mixing_course_progress_v2', JSON.stringify(updatedCompletedWeeks));

                    // 靜默處理沙盒安全阻擋

                                    <div className="p-10 flex-grow space-y-10">
                                        <div>
                                            <h3 className="flex items-center gap-3 text-lg font-bold text-zinc-100 mb-6">
                                                <Icon name="book-open" className="text-indigo-400" /> 本項核心重點
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                {currentWeekData.details.map((detail, idx) => (
                                                    <div key={idx} className="flex gap-5 p-5 bg-zinc-800/30 rounded-2xl border border-zinc-700/20 hover:border-zinc-500/30 transition-all">
                                                        <div className="flex-shrink-0 w-8 h-8 rounded-lg bg-zinc-800 border border-zinc-700/50 flex items-center justify-center text-xs font-bold text-zinc-400">
                                                            {idx + 1}
                                                        </div>
                                                        <p className="text-zinc-300 leading-relaxed pt-0.5 text-sm font-medium">{detail}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="p-6 bg-indigo-500/5 rounded-2xl border border-indigo-500/10 relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 p-8 opacity-5 group-hover:opacity-10 transition-opacity">
                                                <Icon name="zap" size={60} className="text-indigo-500" />
                                            </div>
                                            <div className="flex gap-4 relative z-10">
                                                <div className="w-1.5 bg-indigo-500 rounded-full flex-shrink-0" />
                                                <div>
                                                    <h4 className="font-black text-indigo-400 mb-2 text-xs uppercase tracking-widest">大師建議 Pro Tip</h4>
                                                    <p className="text-zinc-400 text-sm leading-relaxed">{currentWeekData.tip}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 上下項目切換按鈕 */}
                                        <div className="flex items-center justify-between pt-8 border-t border-zinc-800 mt-auto">
                                            <button 
                                                disabled={currentWeekData.id === allWeeksOfCurrentCat[0].id} 
                                                onClick={() => {
                                                    const currentIndex = allWeeksOfCurrentCat.findIndex(w => w.id === currentWeekData.id);
                                                    if (currentIndex > 0) setActiveWeek(allWeeksOfCurrentCat[currentIndex - 1].id);
                                                }} 
                                                className="flex items-center gap-2 text-zinc-500 hover:text-white disabled:opacity-25 font-bold transition-all text-sm"
                                            >
                                                前一個項目
                                            </button>
                                            <button 
                                                disabled={currentWeekData.id === allWeeksOfCurrentCat[allWeeksOfCurrentCat.length - 1].id} 
                                                onClick={() => {
                                                    const currentIndex = allWeeksOfCurrentCat.findIndex(w => w.id === currentWeekData.id);
                                                    if (currentIndex < allWeeksOfCurrentCat.length - 1) setActiveWeek(allWeeksOfCurrentCat[currentIndex + 1].id);
                                                }} 
                                                className="px-8 py-3 bg-zinc-100 hover:bg-white text-zinc-900 rounded-xl font-bold transition-all text-sm disabled:opacity-25"
                                            >
                                                下一個項目
                                            </button>
                                        </div>
                                    </div>
                                    
                                </div>
                            </section>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-zinc-900 bg-zinc-950 py-6 text-center text-xs text-zinc-600">
                        <p>© {new Date().getFullYear()} 光專業音樂混音班. All rights reserved. 混音是一門科學，也是永無止境的藝術。</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
